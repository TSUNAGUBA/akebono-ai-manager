# デプロイ(GCP Cloud Run)
# 設定値はすべて repository secrets から読み取る。
# secrets の登録は scripts/setup/register-github-secrets.ps1 で行う。
# 手順の全体像: docs/operations/deployment-setup.md

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # Workload Identity Federation(キーレス認証)に必要

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  IMAGE_NAME: ai-manager

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test

  deploy:
    runs-on: ubuntu-latest
    needs: verify
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: 必須 secrets の検証
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_PROJECT_NUMBER: ${{ secrets.GCP_PROJECT_NUMBER }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_DEPLOY_SERVICE_ACCOUNT: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}
          GCP_RUNTIME_SERVICE_ACCOUNT: ${{ secrets.GCP_RUNTIME_SERVICE_ACCOUNT }}
          GCP_ARTIFACT_REPOSITORY: ${{ secrets.GCP_ARTIFACT_REPOSITORY }}
          DASHBOARD_EXPOSURE: ${{ secrets.DASHBOARD_EXPOSURE }}
          DASHBOARD_AUTH_MODE: ${{ secrets.DASHBOARD_AUTH_MODE }}
          DASHBOARD_IAP_AUDIENCE: ${{ secrets.DASHBOARD_IAP_AUDIENCE }}
        run: |
          missing=""
          for name in GCP_PROJECT_ID GCP_PROJECT_NUMBER GCP_REGION GCP_WORKLOAD_IDENTITY_PROVIDER GCP_DEPLOY_SERVICE_ACCOUNT GCP_RUNTIME_SERVICE_ACCOUNT GCP_ARTIFACT_REPOSITORY; do
            if [ -z "${!name}" ]; then missing="$missing $name"; fi
          done
          if [ -n "$missing" ]; then
            echo "::error::repository secrets が未設定です:$missing"
            echo "scripts/setup/register-github-secrets.ps1 で登録してください(docs/operations/deployment-setup.md 参照)"
            exit 1
          fi
          # 途中のサービスまでデプロイされた状態で止まらないよう、設定値の妥当性はここで fail-fast する
          # (secret 値はログにマスクされるため、エラー時は deploy-config.json を確認すること)
          case "${DASHBOARD_EXPOSURE:-lb-iap}" in
            lb-iap)     DEFAULT_AUTH_MODE=iap ;;
            direct-iap) DEFAULT_AUTH_MODE=header ;;
            *)
              echo "::error::DASHBOARD_EXPOSURE は lb-iap / direct-iap のいずれかです"
              exit 1
              ;;
          esac
          # dev はローカル開発専用(固定ユーザーへのなりすましになるためクラウドへは配備しない)
          case "${DASHBOARD_AUTH_MODE:-}" in
            ''|iap|header) ;;
            *)
              echo "::error::DASHBOARD_AUTH_MODE は iap / header(または未設定=公開モードから導出)のいずれかです。dev はローカル開発専用です"
              exit 1
              ;;
          esac
          AUTH_MODE="${DASHBOARD_AUTH_MODE:-$DEFAULT_AUTH_MODE}"
          # 旧既定の DASHBOARD_AUTH_MODE=iap が残ったまま direct-iap に切り替えると、
          # IAP_AUDIENCE 未設定で全リクエストが 500(AIM-1001)になるため、デプロイ前に検出する
          if [ "${DASHBOARD_EXPOSURE:-lb-iap}" = "direct-iap" ] && [ "$AUTH_MODE" != "header" ] && [ -z "$DASHBOARD_IAP_AUDIENCE" ]; then
            echo "::error::direct-iap で AUTH_MODE=iap ですが DASHBOARD_IAP_AUDIENCE が未設定です。DASHBOARD_AUTH_MODE を header に変更するか、secret を削除してください(docs/operations/deployment-setup.md Step 7-4 A)"
            exit 1
          fi

      - name: GCP 認証(Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Docker 認証(Artifact Registry)
        env:
          GCP_REGION: ${{ secrets.GCP_REGION }}
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: イメージのビルドとプッシュ
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          GCP_ARTIFACT_REPOSITORY: ${{ secrets.GCP_ARTIFACT_REPOSITORY }}
        run: |
          IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GCP_ARTIFACT_REPOSITORY}/${IMAGE_NAME}"
          docker build -t "${IMAGE}:${GITHUB_SHA}" -t "${IMAGE}:latest" .
          docker push "${IMAGE}:${GITHUB_SHA}"
          docker push "${IMAGE}:latest"
          echo "IMAGE=${IMAGE}:${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: DB マイグレーション(Cloud Run Job)
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          GCP_RUNTIME_SERVICE_ACCOUNT: ${{ secrets.GCP_RUNTIME_SERVICE_ACCOUNT }}
          GCP_VPC_CONNECTOR: ${{ secrets.GCP_VPC_CONNECTOR }}
        run: |
          VPC_FLAGS=()
          if [ -n "$GCP_VPC_CONNECTOR" ]; then
            VPC_FLAGS=(--vpc-connector "$GCP_VPC_CONNECTOR" --vpc-egress all-traffic)
          fi
          gcloud run jobs deploy ai-manager-db-migrate \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --image "$IMAGE" \
            --command node \
            --args packages/db/dist/migrate.js \
            --service-account "$GCP_RUNTIME_SERVICE_ACCOUNT" \
            --set-secrets "DB_HOST=ai-manager-db-host:latest,DB_NAME=ai-manager-db-name:latest,DB_USER=ai-manager-db-admin-user:latest,DB_PASSWORD=ai-manager-db-admin-password:latest" \
            --memory 512Mi \
            --task-timeout 600 \
            --max-retries 0 \
            "${VPC_FLAGS[@]}"
          gcloud run jobs execute ai-manager-db-migrate \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --wait

      - name: chat-gateway のデプロイ
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_PROJECT_NUMBER: ${{ secrets.GCP_PROJECT_NUMBER }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          GCP_RUNTIME_SERVICE_ACCOUNT: ${{ secrets.GCP_RUNTIME_SERVICE_ACCOUNT }}
          GCP_VPC_CONNECTOR: ${{ secrets.GCP_VPC_CONNECTOR }}
          ADMIN_SPACE_ID: ${{ secrets.ADMIN_SPACE_ID }}
          VERTEX_LOCATION: ${{ secrets.VERTEX_LOCATION }}
          VERTEX_EMBEDDING_LOCATION: ${{ secrets.VERTEX_EMBEDDING_LOCATION }}
          MODEL_FLASH_LITE: ${{ secrets.MODEL_FLASH_LITE }}
          MODEL_FLASH: ${{ secrets.MODEL_FLASH }}
          MODEL_PRO: ${{ secrets.MODEL_PRO }}
          MODEL_PRICING_JSON: ${{ secrets.MODEL_PRICING_JSON }}
          EMBEDDING_MODEL: ${{ secrets.EMBEDDING_MODEL }}
          KNOWLEDGE_SCOPE_HOPS: ${{ secrets.KNOWLEDGE_SCOPE_HOPS }}
          KNOWLEDGE_SCOPE_FALLBACK: ${{ secrets.KNOWLEDGE_SCOPE_FALLBACK }}
        run: |
          VPC_FLAGS=()
          if [ -n "$GCP_VPC_CONNECTOR" ]; then
            VPC_FLAGS=(--vpc-connector "$GCP_VPC_CONNECTOR" --vpc-egress all-traffic)
          fi
          # MODEL_PRICING_JSON はカンマを含むため、gcloud の代替デリミタ構文(^|^)で連結する
          ENV_VARS="GCP_PROJECT_ID=${GCP_PROJECT_ID}|GCP_REGION=${GCP_REGION}|GCP_PROJECT_NUMBER=${GCP_PROJECT_NUMBER}"
          # 任意の Vertex/ナレッジスコープ設定(未設定ならコード側の既定値: 生成系 global / embedding は GCP_REGION、
          # スコープはホップ数 1・フォールバック exclude-customer)
          for name in ADMIN_SPACE_ID VERTEX_LOCATION VERTEX_EMBEDDING_LOCATION MODEL_FLASH_LITE MODEL_FLASH MODEL_PRO MODEL_PRICING_JSON EMBEDDING_MODEL KNOWLEDGE_SCOPE_HOPS KNOWLEDGE_SCOPE_FALLBACK; do
            if [ -n "${!name}" ]; then ENV_VARS="${ENV_VARS}|${name}=${!name}"; fi
          done
          # Chat からのリクエストはアプリ層で JWT 検証するため公開エンドポイントとする
          gcloud run deploy ai-manager-chat-gateway \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --image "$IMAGE" \
            --command node \
            --args packages/chat-gateway/dist/index.js \
            --service-account "$GCP_RUNTIME_SERVICE_ACCOUNT" \
            --allow-unauthenticated \
            --set-env-vars "^|^${ENV_VARS}" \
            --set-secrets "DB_HOST=ai-manager-db-host:latest,DB_NAME=ai-manager-db-name:latest,DB_USER=ai-manager-db-app-user:latest,DB_PASSWORD=ai-manager-db-app-password:latest" \
            --min-instances 0 \
            --max-instances 3 \
            --concurrency 10 \
            --memory 512Mi \
            --timeout 120 \
            "${VPC_FLAGS[@]}"

      - name: batch のデプロイ
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_PROJECT_NUMBER: ${{ secrets.GCP_PROJECT_NUMBER }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          GCP_RUNTIME_SERVICE_ACCOUNT: ${{ secrets.GCP_RUNTIME_SERVICE_ACCOUNT }}
          GCP_VPC_CONNECTOR: ${{ secrets.GCP_VPC_CONNECTOR }}
          KNOWLEDGE_DRIVE_FOLDER_ID: ${{ secrets.KNOWLEDGE_DRIVE_FOLDER_ID }}
          VERTEX_LOCATION: ${{ secrets.VERTEX_LOCATION }}
          VERTEX_EMBEDDING_LOCATION: ${{ secrets.VERTEX_EMBEDDING_LOCATION }}
          MODEL_FLASH_LITE: ${{ secrets.MODEL_FLASH_LITE }}
          MODEL_FLASH: ${{ secrets.MODEL_FLASH }}
          MODEL_PRO: ${{ secrets.MODEL_PRO }}
          MODEL_PRICING_JSON: ${{ secrets.MODEL_PRICING_JSON }}
          EMBEDDING_MODEL: ${{ secrets.EMBEDDING_MODEL }}
          ADMIN_SPACE_ID: ${{ secrets.ADMIN_SPACE_ID }}
          CALENDAR_ENABLED: ${{ secrets.CALENDAR_ENABLED }}
          DELEGATION_SA_EMAIL: ${{ secrets.DELEGATION_SA_EMAIL }}
          ANOMALY_STALL_DAYS: ${{ secrets.ANOMALY_STALL_DAYS }}
          ANOMALY_OVERLOAD_TASKS: ${{ secrets.ANOMALY_OVERLOAD_TASKS }}
          ANOMALY_QUALITY_MIN_SAMPLES: ${{ secrets.ANOMALY_QUALITY_MIN_SAMPLES }}
          ANOMALY_COOLDOWN_DAYS: ${{ secrets.ANOMALY_COOLDOWN_DAYS }}
        run: |
          VPC_FLAGS=()
          if [ -n "$GCP_VPC_CONNECTOR" ]; then
            VPC_FLAGS=(--vpc-connector "$GCP_VPC_CONNECTOR" --vpc-egress all-traffic)
          fi
          # MODEL_PRICING_JSON はカンマを含むため、gcloud の代替デリミタ構文(^|^)で連結する
          ENV_VARS="GCP_PROJECT_ID=${GCP_PROJECT_ID}|GCP_REGION=${GCP_REGION}|BATCH_INVOKER_SA=${GCP_RUNTIME_SERVICE_ACCOUNT}"
          # 任意の Vertex/Chat/カレンダー/異常検知閾値の設定(未設定ならコード側の既定値。
          # 異常検知の既定は ANOMALY_STALL_DAYS=3 / OVERLOAD_TASKS=7 / QUALITY_MIN_SAMPLES=3 / COOLDOWN_DAYS=7)
          for name in KNOWLEDGE_DRIVE_FOLDER_ID VERTEX_LOCATION VERTEX_EMBEDDING_LOCATION MODEL_FLASH_LITE MODEL_FLASH MODEL_PRO MODEL_PRICING_JSON EMBEDDING_MODEL ADMIN_SPACE_ID CALENDAR_ENABLED DELEGATION_SA_EMAIL ANOMALY_STALL_DAYS ANOMALY_OVERLOAD_TASKS ANOMALY_QUALITY_MIN_SAMPLES ANOMALY_COOLDOWN_DAYS; do
            if [ -n "${!name}" ]; then ENV_VARS="${ENV_VARS}|${name}=${!name}"; fi
          done
          # Scheduler(OIDC)のみ呼び出し可。IAM +アプリ層検証の多層防御
          gcloud run deploy ai-manager-batch \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --image "$IMAGE" \
            --command node \
            --args packages/batch/dist/index.js \
            --service-account "$GCP_RUNTIME_SERVICE_ACCOUNT" \
            --no-allow-unauthenticated \
            --set-env-vars "^|^${ENV_VARS}" \
            --set-secrets "DB_HOST=ai-manager-db-host:latest,DB_NAME=ai-manager-db-name:latest,DB_USER=ai-manager-db-app-user:latest,DB_PASSWORD=ai-manager-db-app-password:latest" \
            --min-instances 0 \
            --max-instances 1 \
            --concurrency 1 \
            --memory 512Mi \
            --timeout 900 \
            "${VPC_FLAGS[@]}"
          gcloud run services add-iam-policy-binding ai-manager-batch \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --member "serviceAccount:${GCP_RUNTIME_SERVICE_ACCOUNT}" \
            --role roles/run.invoker

      - name: dashboard のデプロイ
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          GCP_RUNTIME_SERVICE_ACCOUNT: ${{ secrets.GCP_RUNTIME_SERVICE_ACCOUNT }}
          GCP_VPC_CONNECTOR: ${{ secrets.GCP_VPC_CONNECTOR }}
          DASHBOARD_AUTH_MODE: ${{ secrets.DASHBOARD_AUTH_MODE }}
          DASHBOARD_IAP_AUDIENCE: ${{ secrets.DASHBOARD_IAP_AUDIENCE }}
          DASHBOARD_EXPOSURE: ${{ secrets.DASHBOARD_EXPOSURE }}
          DASHBOARD_ADMIN_DB_ENABLED: ${{ secrets.DASHBOARD_ADMIN_DB_ENABLED }}
          DB_ADMIN_POOL_MAX: ${{ secrets.DB_ADMIN_POOL_MAX }}
        run: |
          VPC_FLAGS=()
          if [ -n "$GCP_VPC_CONNECTOR" ]; then
            VPC_FLAGS=(--vpc-connector "$GCP_VPC_CONNECTOR" --vpc-egress all-traffic)
          fi
          # マスタ管理 UI(v0.3)用の書込ロール接続。GCP 側シークレット
          # (ai-manager-db-master-admin-*)の登録後に有効化する二段構え
          # (未登録のまま参照するとデプロイが失敗するため、フラグで明示的に opt-in)
          SET_SECRETS="DB_HOST=ai-manager-db-host:latest,DB_NAME=ai-manager-db-name:latest,DB_USER=ai-manager-db-dashboard-user:latest,DB_PASSWORD=ai-manager-db-dashboard-password:latest"
          ADMIN_ENV=""
          if [ "$DASHBOARD_ADMIN_DB_ENABLED" = "true" ]; then
            SET_SECRETS="${SET_SECRETS},DB_ADMIN_USER=ai-manager-db-master-admin-user:latest,DB_ADMIN_PASSWORD=ai-manager-db-master-admin-password:latest"
            # 管理用プールの最大接続数(任意 secret。空なら付けずコード側の既定値 2)
            if [ -n "$DB_ADMIN_POOL_MAX" ]; then
              ADMIN_ENV=",DB_ADMIN_POOL_MAX=${DB_ADMIN_POOL_MAX}"
            fi
          fi
          # 公開モード(手順: docs/operations/deployment-setup.md Step 7-4):
          #   lb-iap(既定): LB+IAP 経由のみ許可し、*.run.app への直接アクセスを ingress で遮断
          #   direct-iap  : Cloud Run 直付け IAP(MVP 向け・LB 不要)。*.run.app を IAP 保護のまま公開。
          #                 IAP 有効化(一回)は手動 — 未実施でも --no-allow-unauthenticated のため全拒否で安全側
          EXPOSURE="${DASHBOARD_EXPOSURE:-lb-iap}"
          case "$EXPOSURE" in
            lb-iap)     INGRESS=internal-and-cloud-load-balancing; AUTH_FLAG=--allow-unauthenticated;    DEFAULT_AUTH_MODE=iap ;;
            direct-iap) INGRESS=all;                               AUTH_FLAG=--no-allow-unauthenticated; DEFAULT_AUTH_MODE=header ;;
            *)
              echo "::error::DASHBOARD_EXPOSURE は lb-iap / direct-iap のいずれかです"
              exit 1
              ;;
          esac
          AUTH_MODE="${DASHBOARD_AUTH_MODE:-$DEFAULT_AUTH_MODE}"
          # 「必須 secrets の検証」ステップと同じチェックの防御的再掲
          # (アプリは header/dev 以外のあらゆる値を iap モード扱いするため、header 以外は audience 必須)
          if [ "$EXPOSURE" = "direct-iap" ] && [ "$AUTH_MODE" != "header" ] && [ -z "$DASHBOARD_IAP_AUDIENCE" ]; then
            echo "::error::direct-iap で AUTH_MODE=iap ですが DASHBOARD_IAP_AUDIENCE が未設定です。DASHBOARD_AUTH_MODE を header に変更するか、secret を削除してください(docs/operations/deployment-setup.md Step 7-4 A)"
            exit 1
          fi
          ENV_VARS="GCP_PROJECT_ID=${GCP_PROJECT_ID},GCP_REGION=${GCP_REGION},AUTH_MODE=${AUTH_MODE},DB_POOL_MAX=5${ADMIN_ENV}"
          if [ -n "$DASHBOARD_IAP_AUDIENCE" ]; then
            ENV_VARS="${ENV_VARS},IAP_AUDIENCE=${DASHBOARD_IAP_AUDIENCE}"
          fi
          # 認証は IAP(ネットワーク層)+アプリ層検証の多層防御
          gcloud run deploy ai-manager-dashboard \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --image "$IMAGE" \
            --command node \
            --args packages/dashboard/dist/index.js \
            --service-account "$GCP_RUNTIME_SERVICE_ACCOUNT" \
            "$AUTH_FLAG" \
            --ingress "$INGRESS" \
            --set-env-vars "$ENV_VARS" \
            --set-secrets "$SET_SECRETS" \
            --min-instances 0 \
            --max-instances 2 \
            --concurrency 20 \
            --memory 512Mi \
            --timeout 60 \
            "${VPC_FLAGS[@]}"

      - name: Cloud Scheduler ジョブの登録(冪等)
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          GCP_RUNTIME_SERVICE_ACCOUNT: ${{ secrets.GCP_RUNTIME_SERVICE_ACCOUNT }}
        run: |
          BATCH_URL=$(gcloud run services describe ai-manager-batch \
            --project "$GCP_PROJECT_ID" --region "$GCP_REGION" --format 'value(status.url)')

          upsert_job() {
            local name="$1" schedule="$2" path="$3"
            if gcloud scheduler jobs describe "$name" --project "$GCP_PROJECT_ID" --location "$GCP_REGION" >/dev/null 2>&1; then
              gcloud scheduler jobs update http "$name" \
                --project "$GCP_PROJECT_ID" --location "$GCP_REGION" \
                --schedule "$schedule" --time-zone "Asia/Tokyo" \
                --uri "${BATCH_URL}${path}" --http-method POST \
                --oidc-service-account-email "$GCP_RUNTIME_SERVICE_ACCOUNT" \
                --oidc-token-audience "$BATCH_URL"
            else
              gcloud scheduler jobs create http "$name" \
                --project "$GCP_PROJECT_ID" --location "$GCP_REGION" \
                --schedule "$schedule" --time-zone "Asia/Tokyo" \
                --uri "${BATCH_URL}${path}" --http-method POST \
                --oidc-service-account-email "$GCP_RUNTIME_SERVICE_ACCOUNT" \
                --oidc-token-audience "$BATCH_URL" \
                --attempt-deadline 900s
            fi
          }

          upsert_job ai-manager-morning-checkin "0 8 * * 1-5" /jobs/morning-checkin
          upsert_job ai-manager-daily-report    "0 18 * * 1-5" /jobs/daily-report
          upsert_job ai-manager-weekly-summary  "0 17 * * 5"  /jobs/weekly-summary
          upsert_job ai-manager-knowledge-sync  "30 6 * * *"  /jobs/knowledge-sync
          upsert_job ai-manager-anomaly-scan    "30 9 * * 1-5" /jobs/anomaly-scan

      - name: デプロイ結果の表示
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
        run: |
          echo "## デプロイ完了" >> "$GITHUB_STEP_SUMMARY"
          for svc in ai-manager-chat-gateway ai-manager-batch ai-manager-dashboard; do
            url=$(gcloud run services describe "$svc" --project "$GCP_PROJECT_ID" --region "$GCP_REGION" --format 'value(status.url)')
            echo "- ${svc}: ${url}" >> "$GITHUB_STEP_SUMMARY"
          done
