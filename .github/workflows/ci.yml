name: CI

on:
  pull_request:
  push:
    branches-ignore: [main]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 依存関係のインストール
        run: npm ci

      - name: 型チェック+ビルド
        run: npm run build

      - name: ユニットテスト
        run: npm test

      - name: Docker イメージのビルド検証
        run: docker build -t ai-manager:ci .
